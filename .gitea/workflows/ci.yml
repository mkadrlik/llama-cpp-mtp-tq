name: Build and Push
run-name: ${{ gitea.actor }} build ${{ github.sha }}

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  REGISTRY_GITEA: nas.kadrlik.home:3042
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: mkadrlik/llama-cpp-mtp-tq
  UPSTREAM_REPO: AtomicBot-ai/atomic-llama-cpp-turboquant
  UPSTREAM_BRANCH: feature/turboquant-kv-cache

jobs:
  check-upstream:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux]
    outputs:
      sha: ${{ steps.get-sha.outputs.sha }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Get upstream HEAD
        id: get-sha
        run: |
          SHA=$(git ls-remote "https://github.com/${{ env.UPSTREAM_REPO }}.git" "refs/heads/${{ env.UPSTREAM_BRANCH }}" | cut -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
      - name: Check if changed
        id: check
        run: |
          OLD=$(grep -v '^#' .upstream-hash | head -1 | awk '{print $1}' | tr -d '[:space:]')
          NEW="${{ steps.get-sha.outputs.sha }}"
          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "::warning::Upstream changed! $OLD → $NEW"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Create issue if upstream changed
        if: steps.check.outputs.changed == 'true'
        run: |
          curl -s -X POST "${{ github.api_url }}/repos/${{ github.repository }}/issues" \
            -H "Authorization: token ${{ secrets.CI_GITEA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "Upstream changes detected: ${{ env.UPSTREAM_REPO }}",
              "body": "New upstream commit: `${{ steps.get-sha.outputs.sha }}`\n\nPrevious: `$(grep -v '"'"'^#'"'"' .upstream-hash | head -1 | awk '"'"'{print $1}'"'"')`\n\n1. Review changes at https://github.com/${{ env.UPSTREAM_REPO }}/compare/$(grep -v '"'"'^#'"'"' .upstream-hash | head -1 | awk '"'"'{print $1}'"'"')...${{ steps.get-sha.outputs.sha }}\n2. Update `.upstream-hash`\n3. Build and test locally\n4. Commit and push\n\n_Generated by CI check-upstream job_"
            }'

  verify-patches:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - run: |
          if [ ! -f .upstream-hash ]; then
            echo "::error::Missing .upstream-hash file"; exit 1
          fi
          SHA=$(grep -v '^#' .upstream-hash | head -1 | awk '{print $1}')
          if [ -z "$SHA" ]; then
            echo "::error::No SHA in .upstream-hash"; exit 1
          fi
          echo "Tracking SHA: $SHA (valid)"

  build:
    needs: [check-upstream]
    if: always() && (needs.check-upstream.outputs.changed == 'true' || github.event_name != 'schedule')
    runs-on: [self-hosted, rocm]
    steps:
      - uses: actions/checkout@v4
      - name: Resolve upstream SHA
        id: resolve-sha
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ needs.check-upstream.outputs.changed }}" = "true" ]; then
            SHA="${{ needs.check-upstream.outputs.sha }}"
          else
            SHA=$(grep -v '^#' .upstream-hash | head -1 | awk '{print $1}' | tr -d '[:space:]')
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Building at SHA: $SHA"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Gitea registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GITEA }}
          username: mkadrlik
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: mkadrlik
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Extract metadata
        id: meta
        run: |
          SHA=$(grep -v '^#' .upstream-hash | head -1 | awk '{print $1}' | cut -c1-7)
          DATE=$(date +%Y.%m.%d)
          echo "tags=${{ env.REGISTRY_GITEA }}/${{ env.IMAGE_NAME }}:${DATE}-${SHA},${{ env.REGISTRY_GITEA }}/${{ env.IMAGE_NAME }}:${DATE},${{ env.REGISTRY_GITEA }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${DATE}-${SHA},${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${DATE},${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            UPSTREAM_SHA=${{ steps.resolve-sha.outputs.sha }}