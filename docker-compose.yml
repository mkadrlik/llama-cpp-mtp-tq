services:
  llama-cpp-mtp-tq:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_REGISTRY:-nas.kadrlik.home:3042}/${IMAGE_NAME:-mkadrlik/llama-cpp-mtp-tq}:${IMAGE_TAG:-latest}
    container_name: llama-cpp-mtp-tq
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    security_opt:
      - seccomp=unconfined
    ports:
      - "${SERVER_PORT:-8081}:8080"
    environment:
      HSA_OVERRIDE_GFX_VERSION: "${HSA_OVERRIDE_GFX_VERSION:-11.0.0}"
      HIP_VISIBLE_DEVICES: "${GPU_DEVICES:-0,1,2}"
    volumes:
      - "${MODEL_PATH:-/path/to/models}:/models:ro"
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -m
      - /models/model.gguf
      - -c
      - "${CTX_SIZE:-8192}"
      - -fa
      - on
      - -ctk
      - turbo3
      - -ctv
      - turbo3
      - --spec-type
      - draft-mtp
      - --spec-draft-n-max
      - "2"
      - --spec-draft-n-min
      - "1"
      - -ts
      - "${TENSOR_SPLIT:-2,1,1}"